kind = "web"
previewPath = "/"
title = "Rwanda Stays"
version = "1.0.0"
id = "artifacts/rwanda-stays"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20200
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/rwanda-stays run dev"

[services.env]
PORT = "20200"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/rwanda-stays", "run", "build"]
publicDir = "artifacts/rwanda-stays/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
